---
# tasks file for Windows Active Directory integration

- name: "Windows Integration - Configure DNS servers"
  block:
    - name: "Windows Integration - Set DNS servers"
      win_powershell:
        script: |
          $adapters = Get-NetAdapter | Where-Object { $_.Status -eq 'Up' }
          foreach ($adapter in $adapters) {
            Set-DnsClientServerAddress -InterfaceIndex $adapter.InterfaceIndex -ServerAddresses @({{ ad_dns_servers | map('quote') | join(',') }})
          }
      register: dns_config
      when: ad_configure_dns | bool

    - name: "Windows Integration - Verify DNS configuration"
      win_powershell:
        script: "Get-DnsClientServerAddress | Select-Object InterfaceAlias, ServerAddresses"
      register: dns_verify
      changed_when: false

  rescue:
    - name: "Windows Integration - Display DNS configuration error"
      debug:
        msg: "Failed to configure DNS: {{ ansible_failed_result.msg }}"

- name: "Windows Integration - Configure time synchronization"
  block:
    - name: "Windows Integration - Set NTP servers"
      win_powershell:
        script: |
          $ntp_servers = @({{ ad_ntp_servers | map('quote') | join(',') }})
          w32tm /config /manualpeerlist:$($ntp_servers -join ' ') /syncfromflags:MANUAL /update
          Restart-Service w32time -Force
      register: ntp_config
      when: ad_configure_ntp | bool

  rescue:
    - name: "Windows Integration - Display NTP configuration error"
      debug:
        msg: "Failed to configure NTP: {{ ansible_failed_result.msg }}"

- name: "Windows Integration - Join Active Directory domain"
  block:
    - name: "Windows Integration - Create credentials object"
      set_fact:
        cred_username: "{{ ad_windows_username_domain_format }}"
        cred_password: "{{ ad_password }}"

    - name: "Windows Integration - Domain join"
      win_domain_membership:
        dns_domain_name: "{{ ad_domain }}"
        hostname: "{% if ad_update_hostname %}{{ ad_hostname_prefix }}{{ ansible_hostname }}{% endif %}"
        domain_admin_user: "{{ cred_username }}"
        domain_admin_password: "{{ cred_password }}"
        state: "domain"
        ou: "{{ ad_windows_domain_join_ou }}"
      register: domain_join_result
      until: domain_join_result is succeeded
      retries: "{{ ad_check_retry_count }}"
      delay: "{{ ad_check_retry_delay }}"

    - name: "Windows Integration - Domain join completed"
      debug:
        msg: "Successfully joined domain: {{ ad_domain }}"
      when: domain_join_result is succeeded

    - name: "Windows Integration - Reboot after domain join"
      win_reboot:
        post_reboot_delay: 120
        reboot_timeout: "{{ ad_windows_restart_timeout }}"
      when: 
        - domain_join_result is changed
        - ad_windows_restart_after_join | bool

  rescue:
    - name: "Windows Integration - Display domain join error"
      debug:
        msg: "Failed to join domain: {{ ansible_failed_result.msg }}"
      failed_when: true

- name: "Windows Integration - Configure Group Policy"
  block:
    - name: "Windows Integration - Refresh Group Policy"
      win_powershell:
        script: |
          gpupdate /force /boot
      register: gpupdate_result
      when: ad_windows_enable_gpo | bool

  rescue:
    - name: "Windows Integration - Display GPO configuration error"
      debug:
        msg: "Failed to update Group Policy: {{ ansible_failed_result.msg }}"

- name: "Windows Integration - Configure Kerberos"
  block:
    - name: "Windows Integration - Set Kerberos realm"
      win_powershell:
        script: |
          $realm = "{{ ad_kerberos_realm }}"
          Write-Host "Kerberos realm is configured for: $realm"
      register: krb_config
      when: ad_configure_kerberos | bool
      changed_when: false

  rescue:
    - name: "Windows Integration - Display Kerberos configuration error"
      debug:
        msg: "Failed to configure Kerberos: {{ ansible_failed_result.msg }}"

- name: "Windows Integration - Configure firewall rules"
  block:
    - name: "Windows Integration - Open required ports"
      win_firewall_rule:
        name: "AD Integration - {{ item.name }}"
        port: "{{ item.port }}"
        protocol: "{{ item.protocol }}"
        direction: "in"
        action: "allow"
        state: "present"
        enabled: true
      loop: "{{ ad_required_ports }}"
      when: 
        - ad_configure_firewall | bool
        - ad_required_ports_open | bool

  rescue:
    - name: "Windows Integration - Display firewall configuration error"
      debug:
        msg: "Failed to configure firewall: {{ ansible_failed_result.msg }}"

- name: "Windows Integration - Configure password policy"
  block:
    - name: "Windows Integration - Set password policy"
      win_powershell:
        script: |
          $domain = Get-ADDomain -Identity "{{ ad_domain }}"
          if ($domain) {
            Set-ADDefaultDomainPasswordPolicy `
              -Identity "{{ ad_domain }}" `
              -MinPasswordLength {{ ad_enforce_password_length }} `
              -MinPasswordAge {{ ad_enforce_minimum_password_age }} `
              -MaxPasswordAge {{ ad_enforce_maximum_password_age }} `
              -LockoutThreshold {{ ad_failed_login_attempts }} `
              -LockoutDuration (New-TimeSpan -Minutes {{ ad_failed_login_lockout_duration }})
          }
      register: pwd_policy
      when: ad_enforce_password_policy | bool
      ignore_errors: true

  rescue:
    - name: "Windows Integration - Display password policy error"
      debug:
        msg: "Failed to configure password policy: {{ ansible_failed_result.msg }}"

- name: "Windows Integration - Add AD users to local groups"
  block:
    - name: "Windows Integration - Add Domain Admins to local Administrators"
      win_group_membership:
        name: "Administrators"
        members: "{{ ad_local_admin_groups }}"
        state: "present"
      loop: "{{ ad_ad_user_groups }}"
      when: ad_ad_user_groups | length > 0

  rescue:
    - name: "Windows Integration - Display group membership error"
      debug:
        msg: "Failed to configure group membership: {{ ansible_failed_result.msg }}"

- name: "Windows Integration - Configure audit logging"
  block:
    - name: "Windows Integration - Enable security audit logging"
      win_powershell:
        script: |
          auditpol /set /subcategory:"Logon/Logoff" /success:enable /failure:enable
          auditpol /set /subcategory:"Account Logon" /success:enable /failure:enable
          auditpol /set /subcategory:"Account Management" /success:enable /failure:enable
      register: audit_config
      when: ad_enable_audit_logging | bool
      ignore_errors: true

  rescue:
    - name: "Windows Integration - Display audit configuration error"
      debug:
        msg: "Failed to configure audit logging: {{ ansible_failed_result.msg }}"

- name: "Windows Integration - Clean up temporary files"
  block:
    - name: "Windows Integration - Remove temporary credential files"
      win_file:
        path: "{{ item }}"
        state: "absent"
      loop:
        - "C:\\Temp\\ad_credentials.txt"
        - "C:\\Temp\\domain_join_log.txt"
      ignore_errors: true

  rescue:
    - name: "Windows Integration - Display cleanup error"
      debug:
        msg: "Failed to cleanup temporary files"
