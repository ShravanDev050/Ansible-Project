---
# defaults file for ad

# Active Directory Installation Defaults
ad_domain_name: "example.com"
ad_domain_netbios_name: "EXAMPLE"
ad_forest_level: "2016"  # 2012, 2012R2, 2016, 2019, 2022
ad_domain_level: "2016"  # 2012, 2012R2, 2016, 2019, 2022

# Database and Log locations (Windows)
ad_database_path: "C:\\Windows\\NTDS"
ad_log_path: "C:\\Windows\\NTDS"
ad_sysvol_path: "C:\\Windows\\SYSVOL"

# LDAP Configuration
ad_ldap_port: 389
ad_ldaps_port: 636
ad_gc_port: 3268
ad_gc_ssl_port: 3269

# DNS Configuration
ad_install_dns: true
ad_dns_forwarders: []
ad_enable_dnssec: false

# DHCP Configuration (Optional)
ad_install_dhcp: false
ad_dhcp_scopes: []

# Users and Groups Configuration
ad_admin_user: "Administrator"
ad_service_account: "svc_account"
ad_admin_password: ""  # Should be provided via ansible-vault

# Replication and Replication Settings
ad_replication_interval: 15  # minutes
ad_garbage_collection_interval: 12  # hours

# NTP/Time Configuration
ad_ntp_servers:
  - "0.pool.ntp.org"
  - "1.pool.ntp.org"

# Backup Configuration
ad_backup_enabled: false
ad_backup_location: "/backups/ad"
ad_backup_schedule: "weekly"  # daily, weekly, monthly

# Firewall Configuration
ad_firewall_enabled: true
ad_allow_ldap_replication: true

# Linux Specific (for Samba AD)
samba_realm: "{{ ad_domain_name | upper }}"
samba_workgroup: "{{ ad_domain_netbios_name }}"
samba_server_role: "active directory domain controller"
samba_idmap_config: "* : backend = tdb"

# Logging
ad_log_level: "INFO"  # DEBUG, INFO, WARNING, ERROR
ad_enable_audit_logging: true
ad_audit_events:
  - "account-logon"
  - "directory-service-access"
  - "account-management"
