name: CI/CD - Build and Publish Collection
on:
  schedule:
    - cron: '39 20 * * *'
  push:
    branches: [ "main" ]
    tags: [ 'v*.*.*' ]
  pull_request:
    branches: [ "main" ]

jobs:
  test:
    name: Run Sanity Checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          pip install ansible-core ansible-lint
          # Installing all required collections into the runner environment
          ansible-galaxy collection install ansible.windows community.windows
          if [ -f requirements.yml ]; then
            ansible-galaxy collection install -r requirements.yml
          fi

      - name: Run Ansible-lint
        # This now sees all collections installed in the step above
        run: ansible-lint

      - name: Perform Sanity Testing
        uses: ansible-community/ansible-test-gh-action@release/v1
        with:
          ansible-core-version: stable-2.16
          testing-type: sanity

  publish:
    name: Build and Publish to Galaxy
    needs: test
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Build Collection
        id: build
        uses: ansible-community/github-action-build-collection@main

      - name: Publish to Ansible Galaxy
        uses: qsypoq/ansible-galaxy-publish-action@v1
        with:
          galaxy_token: ${{ secrets.GALAXY_API_KEY }}
